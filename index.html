<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PIPEPRO — 배관 현장 도우미</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1c1f2e; --bg2: #262a3d; --bg3: #222536;
    --border: #3a3f58; --border2: #2e3248;
    --text: #f5f0e8; --text2: #ddd8cc; --muted: #9aa0bc;
    --accent: #e07b39; --accent2: #c96a2a;
    --danger: #e05050; --ok: #50c070; --blue: #4a9ede;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; font-size: 16px; -webkit-font-smoothing: antialiased; }
  .app { max-width: 420px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: var(--bg); }

  /* 상단바 */
  .topbar { padding: 16px 20px 14px; border-bottom: 1px solid var(--border2); }
  .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 700; letter-spacing: 1px; }
  .logo span { color: var(--accent); }
  .logo-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }

  /* 본문 */
  .body { flex: 1; padding: 20px; overflow-y: auto; }
  .slabel { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; font-weight: 600; }

  /* 검색 탭 */
  .tab-wrap { display: flex; gap: 0; margin-bottom: 14px; background: var(--bg2); border-radius: 8px; padding: 4px; }
  .tab-btn { flex: 1; padding: 8px; font-size: 14px; font-weight: 600; font-family: 'Barlow', sans-serif; border: none; border-radius: 6px; cursor: pointer; transition: all .2s; background: transparent; color: var(--muted); }
  .tab-btn.active { background: var(--accent); color: #fff; }

  /* 검색 입력 */
  .search-wrap { margin-bottom: 20px; }
  .search-panel { display: none; }
  .search-panel.active { display: block; }
  .search-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .addr-input {
    flex: 1; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'Barlow', sans-serif;
    font-size: 15px; padding: 13px 14px; outline: none; transition: border-color .2s;
    font-weight: 500;
  }
  .addr-input:focus { border-color: var(--accent); }
  .addr-input::placeholder { color: #4a5070; font-weight: 400; }
  .search-btn {
    background: var(--accent); border: none; border-radius: 8px; color: #fff;
    font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700;
    padding: 13px 20px; cursor: pointer; transition: background .2s; white-space: nowrap;
  }
  .search-btn:hover { background: var(--accent2); }
  .hint { font-size: 12px; color: #4a5070; margin-top: 4px; }

  /* 결과 카드 */
  .bcard { background: var(--bg2); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; animation: fadeIn .3s ease; margin-bottom: 16px; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; } }
  .bhead { padding: 14px 16px; border-bottom: 1px solid var(--border2); display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .bname { font-size: 17px; font-weight: 600; color: var(--text); }
  .baddr { font-size: 13px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
  .badge { font-size: 12px; font-weight: 600; border-radius: 5px; padding: 4px 10px; white-space: nowrap; flex-shrink: 0; }
  .badge.danger { background: #2a1414; color: var(--danger); border: 1px solid #3d1818; }
  .badge.warn   { background: #2a1f14; color: var(--accent); border: 1px solid #3d2a18; }
  .badge.ok     { background: #142a18; color: var(--ok);     border: 1px solid #183d20; }

  .igrid { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 12px 16px; gap: 10px; border-bottom: 1px solid var(--border2); }
  .iitem label { font-size: 11px; color: var(--muted); display: block; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; font-weight: 600; }
  .iitem span  { font-size: 15px; color: var(--text2); font-weight: 600; }

  .risksec { padding: 14px 16px; border-bottom: 1px solid var(--border2); }
  .risktitle { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; font-weight: 600; }
  .risk-tag { font-size: 11px; border-radius: 4px; padding: 3px 8px; font-weight: 600; }
  .rrow { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .rlabel { font-size: 13px; color: var(--muted); width: 72px; flex-shrink: 0; font-weight: 500; }
  .rtrack { flex: 1; height: 6px; background: var(--border2); border-radius: 3px; overflow: hidden; }
  .rfill  { height: 100%; border-radius: 3px; transition: width .8s cubic-bezier(.4,0,.2,1); }
  .rpct   { font-size: 13px; color: var(--muted); width: 32px; text-align: right; font-weight: 600; }

  /* 배관 구조도 */
  .pipesec { padding: 14px 16px; border-bottom: 1px solid var(--border2); }
  .pipetitle { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
  .pipe-material { font-size: 12px; padding: 3px 8px; border-radius: 4px; font-weight: 600; }
  .pipe-diagram { width: 100%; }
  .pipe-legend { display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .detailsec { padding: 14px 16px; }
  .dtitle { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; font-weight: 600; }
  .drow { display: flex; justify-content: space-between; font-size: 14px; padding: 6px 0; border-bottom: 1px solid var(--border2); }
  .drow:last-child { border-bottom: none; }
  .drow span:first-child { color: var(--muted); }
  .drow span:last-child  { color: var(--text2); font-weight: 600; }

  /* 최근 검색 */
  .recent-wrap { margin-top: 4px; }
  .recent-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-weight: 600; }
  .recent-clear { font-size: 12px; color: var(--danger); cursor: pointer; background: none; border: none; padding: 0; font-weight: 600; }
  .recent-item { display: flex; align-items: center; justify-content: space-between; background: var(--bg2); border: 1px solid var(--border2); border-radius: 8px; padding: 11px 14px; margin-bottom: 8px; cursor: pointer; transition: border-color .2s; }
  .recent-item:hover { border-color: var(--accent); }
  .recent-addr { font-size: 14px; color: var(--text2); font-weight: 600; }
  .recent-sub  { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .recent-arrow { color: var(--muted); font-size: 18px; }

  /* 빈화면 / 로딩 / 에러 */
  .empty { padding: 48px 20px; text-align: center; color: var(--border); font-size: 14px; line-height: 2.2; }
  .empty svg { width: 36px; height: 36px; stroke: var(--border); display: block; margin: 0 auto 16px; }
  .loading { padding: 40px; text-align: center; color: var(--muted); font-size: 14px; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin-right: 10px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .errmsg { padding: 14px; text-align: center; font-size: 14px; color: var(--danger); background: #2a1414; border: 1px solid #3d1818; border-radius: 8px; font-weight: 500; }

  /* 수리 이력 */
  .history-sec { padding: 14px 16px; border-top: 1px solid var(--border2); }
  .history-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
  .history-add-btn { font-size: 12px; color: var(--accent); background: none; border: 1px solid var(--accent); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-weight: 600; font-family: 'Barlow', sans-serif; }
  .history-form { background: var(--bg3); border-radius: 8px; padding: 12px; margin-bottom: 10px; display: none; }
  .history-form.open { display: block; }
  .history-input { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 14px; padding: 10px 12px; outline: none; margin-bottom: 8px; }
  .history-input:focus { border-color: var(--accent); }
  .history-input::placeholder { color: #4a5070; }
  .history-textarea { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 14px; padding: 10px 12px; outline: none; margin-bottom: 8px; resize: none; height: 80px; }
  .history-textarea:focus { border-color: var(--accent); }
  .history-textarea::placeholder { color: #4a5070; }
  .history-save-btn { background: var(--accent); border: none; border-radius: 6px; color: #fff; font-family: 'Barlow', sans-serif; font-size: 14px; font-weight: 600; padding: 10px 16px; cursor: pointer; width: 100%; }
  .history-item { background: var(--bg3); border-radius: 8px; padding: 11px 14px; margin-bottom: 8px; border-left: 3px solid var(--accent); }
  .history-item-date { font-size: 11px; color: var(--muted); margin-bottom: 4px; display: flex; justify-content: space-between; }
  .history-item-location { font-size: 13px; color: var(--accent); font-weight: 600; margin-bottom: 4px; }
  .history-item-memo { font-size: 13px; color: var(--text2); line-height: 1.5; }
  .history-delete { font-size: 11px; color: var(--danger); background: none; border: none; cursor: pointer; padding: 0; font-weight: 600; }
  .history-empty { font-size: 13px; color: var(--border); text-align: center; padding: 16px 0; }

  /* 하단 네비 */
  .bnav { background: #151825; border-top: 1px solid var(--border2); display: flex; justify-content: space-around; padding: 12px 0 max(16px, env(safe-area-inset-bottom)); flex-shrink: 0; }
  .nitem { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 0 16px; }
  .nitem svg { width: 22px; height: 22px; }
  .nlabel { font-size: 11px; color: var(--border); font-weight: 600; }
  .nitem.active .nlabel { color: var(--accent); }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">PIPE<span>PRO</span></div>
    <div class="logo-sub">배관 현장 도우미</div>
  </div>

  <div class="body">
    <div class="search-wrap">
      <div class="slabel">건물 주소 검색</div>

      <!-- 탭 -->
      <div class="tab-wrap">
        <button class="tab-btn active" onclick="switchTab('jibun')">지번 주소</button>
        <button class="tab-btn" onclick="switchTab('road')">도로명 주소</button>
      </div>

      <!-- 지번 주소 -->
      <div class="search-panel active" id="panel-jibun">
        <div class="search-row">
          <input class="addr-input" id="sigungu" placeholder="시군구  예) 고양시 덕양구" style="flex:1" />
          <input class="addr-input" id="dong" placeholder="법정동  예) 주교동" style="flex:1.2" />
        </div>
        <div class="search-row">
          <input class="addr-input" id="bunji" placeholder="번지  예) 600" />
          <button class="search-btn" onclick="doSearch('jibun')">조회</button>
        </div>
      </div>

      <!-- 도로명 주소 -->
      <div class="search-panel" id="panel-road">
        <div class="search-row">
          <input class="addr-input" id="road-addr" placeholder="도로명 주소  예) 태평로1길 31" />
        </div>
        <div class="search-row">
          <input class="addr-input" id="road-sigungu" placeholder="시군구  예) 중구" style="flex:0.8" />
          <button class="search-btn" onclick="doSearch('road')">조회</button>
        </div>
        <div class="hint">* 시군구 + 도로명 주소를 입력하세요</div>
      </div>
    </div>

    <div id="result"></div>

    <div class="recent-wrap" id="recent-wrap" style="display:none;">
      <div class="recent-title">
        <span>최근 검색</span>
        <button class="recent-clear" onclick="clearRecent()">전체 삭제</button>
      </div>
      <div id="recent-list"></div>
    </div>
  </div>

  <div style="text-align:center;padding:10px 20px;font-size:11px;color:#3a3f58;background:#151825;border-top:1px solid #2e3248;">
    건물 데이터 출처: 국토교통부 건축HUB (data.go.kr)
  </div>
  <div class="bnav">
    <div class="nitem active">
      <svg viewBox="0 0 24 24" fill="none" stroke="#e07b39" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="nlabel" style="color:#e07b39;">홈</span>
    </div>
    <div class="nitem">
      <svg viewBox="0 0 24 24" fill="none" stroke="#3a3f58" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      <span class="nlabel">도면</span>
    </div>
    <div class="nitem">
      <svg viewBox="0 0 24 24" fill="none" stroke="#3a3f58" stroke-width="1.5"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      <span class="nlabel">이력</span>
    </div>
    <div class="nitem">
      <svg viewBox="0 0 24 24" fill="none" stroke="#3a3f58" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0112 0v2"/></svg>
      <span class="nlabel">내정보</span>
    </div>
  </div>
</div>

function switchTab(type) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', (i===0 && type==='jibun') || (i===1 && type==='road'));
  });
  document.getElementById('panel-jibun').classList.toggle('active', type==='jibun');
  document.getElementById('panel-road').classList.toggle('active', type==='road');
}

let recentList = JSON.parse(localStorage.getItem('pipepro_recent') || '[]');

function saveRecent(sigungu, dong, bunji, result) {
  const item = {
    sigungu, dong, bunji,
    bldName: result.bldNm || '',
    addr: result.platPlc || `${sigungu} ${dong} ${bunji}`,
    time: new Date().toLocaleDateString('ko-KR')
  };
  recentList = recentList.filter(r => r.addr !== item.addr);
  recentList.unshift(item);
  if (recentList.length > 10) recentList.pop();
  localStorage.setItem('pipepro_recent', JSON.stringify(recentList));
  renderRecent();
}

// 수리 이력 관련
let currentAddr = '';

function toggleHistoryForm() {
  const form = document.getElementById('history-form');
  form.classList.toggle('open');
}

function saveHistory() {
  const location = document.getElementById('h-location').value.trim();
  const memo = document.getElementById('h-memo').value.trim();
  if (!location && !memo) return;

  const key = 'pipepro_history_' + btoa(encodeURIComponent(currentAddr));
  const list = JSON.parse(localStorage.getItem(key) || '[]');
  list.unshift({
    id: Date.now(),
    date: new Date().toLocaleDateString('ko-KR'),
    location,
    memo
  });
  localStorage.setItem(key, JSON.stringify(list));

  document.getElementById('h-location').value = '';
  document.getElementById('h-memo').value = '';
  document.getElementById('history-form').classList.remove('open');
  renderHistory();
}

function deleteHistory(id) {
  const key = 'pipepro_history_' + btoa(encodeURIComponent(currentAddr));
  let list = JSON.parse(localStorage.getItem(key) || '[]');
  list = list.filter(h => h.id !== id);
  localStorage.setItem(key, JSON.stringify(list));
  renderHistory();
}

function renderHistory() {
  const key = 'pipepro_history_' + btoa(encodeURIComponent(currentAddr));
  const list = JSON.parse(localStorage.getItem(key) || '[]');
  const el = document.getElementById('history-list');
  if (!el) return;
  if (list.length === 0) {
    el.innerHTML = '<div class="history-empty">수리 이력이 없습니다</div>';
    return;
  }
  el.innerHTML = list.map(h => `
    <div class="history-item">
      <div class="history-item-date">
        <span>📅 ${h.date}</span>
        <button class="history-delete" onclick="deleteHistory(${h.id})">삭제</button>
      </div>
      ${h.location ? `<div class="history-item-location">📍 ${h.location}</div>` : ''}
      ${h.memo ? `<div class="history-item-memo">${h.memo}</div>` : ''}
    </div>
  `).join('');
}

function renderRecent() {
  const wrap = document.getElementById('recent-wrap');
  const list = document.getElementById('recent-list');
  if (recentList.length === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  list.innerHTML = recentList.map((r, i) => `
    <div class="recent-item" onclick="searchFromRecent(${i})">
      <div>
        <div class="recent-addr">${r.bldName || r.addr}</div>
        <div class="recent-sub">${r.addr} · ${r.time}</div>
      </div>
      <span class="recent-arrow">›</span>
    </div>
  `).join('');
}

function searchFromRecent(i) {
  const r = recentList[i];
  document.getElementById('sigungu').value = r.sigungu;
  document.getElementById('dong').value = r.dong;
  document.getElementById('bunji').value = r.bunji;
  switchTab('jibun');
  doSearch('jibun');
}

function clearRecent() {
  recentList = [];
  localStorage.removeItem('pipepro_recent');
  renderRecent();
}

// 배관 자재 추정
function getPipeMaterial(year) {
  if (!year || year === '미상') return { name: '미상', color: '#888', desc: '확인 필요' };
  const y = parseInt(year);
  if (y < 1980) return { name: '아연도금강관', color: '#e05050', desc: '부식 심함 · 즉시 점검 권장' };
  if (y < 1990) return { name: '백강관', color: '#e07b39', desc: '스케일 누적 · 점검 필요' };
  if (y < 2000) return { name: 'PVC / 동관', color: '#e0c039', desc: '부분 노후 · 주의 필요' };
  if (y < 2010) return { name: 'PB관 / 동관', color: '#50c070', desc: '양호 · 정기 점검 권장' };
  return { name: 'PB관 / 스테인리스', color: '#4a9ede', desc: '양호 · 최신 자재' };
}

// 배관 구조도 SVG 생성
function buildPipeDiagram(floors, year, struct) {
  const mat = getPipeMaterial(year);
  const floorCount = parseInt(floors) || 3;
  const underground = struct && struct.includes('지하') ? 1 : 0;
  const h = 160;
  const w = 280;
  const floorH = Math.min(30, (h - 40) / (floorCount + 1));

  let svg = `<svg class="pipe-diagram" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">`;

  // 배경
  svg += `<rect width="${w}" height="${h}" fill="#1a1d2a" rx="8"/>`;

  // 메인 수직 배관 (왼쪽)
  const mainX = 50;
  const topY = 20;
  const bottomY = h - 20;
  svg += `<line x1="${mainX}" y1="${topY}" x2="${mainX}" y2="${bottomY}" stroke="${mat.color}" stroke-width="4" stroke-linecap="round"/>`;

  // 각 층 수평 배관
  for (let i = 0; i <= floorCount; i++) {
    const y = topY + (i * (bottomY - topY) / floorCount);
    const floorLabel = floorCount - i === 0 ? 'B1' : `${floorCount - i}F`;
    const isRisk = i === floorCount - 1 || i === 1;

    // 수평 배관
    svg += `<line x1="${mainX}" y1="${y}" x2="${w - 40}" y2="${y}" stroke="${isRisk ? '#e05050' : mat.color}" stroke-width="2.5" stroke-dasharray="${isRisk ? '6,3' : 'none'}"/>`;

    // 층 라벨
    svg += `<text x="18" y="${y + 4}" font-size="10" fill="#8890b0" font-family="sans-serif" font-weight="600">${floorLabel}</text>`;

    // 엔드 캡
    svg += `<circle cx="${w - 40}" cy="${y}" r="4" fill="${isRisk ? '#e05050' : mat.color}"/>`;

    // 위험 표시
    if (isRisk) {
      svg += `<text x="${w - 30}" y="${y + 4}" font-size="10" fill="#e05050" font-family="sans-serif">!</text>`;
    }
  }

  // 지하 배관 (수도 인입)
  svg += `<line x1="${mainX}" y1="${bottomY}" x2="${mainX}" y2="${bottomY}" stroke="#4a9ede" stroke-width="6" stroke-linecap="round"/>`;
  svg += `<text x="${mainX + 8}" y="${bottomY + 4}" font-size="10" fill="#4a9ede" font-family="sans-serif" font-weight="600">수도 인입</text>`;

  // 메인 밸브
  svg += `<rect x="${mainX - 8}" y="${topY + 10}" width="16" height="10" rx="2" fill="#2e3248" stroke="${mat.color}" stroke-width="1.5"/>`;
  svg += `<text x="${mainX + 10}" y="${topY + 18}" font-size="9" fill="${mat.color}" font-family="sans-serif">MV</text>`;

  svg += `</svg>`;
  return { svg, mat };
}

async function doSearch(type) {
  let sigungu, dong, bunji;

  if (type === 'jibun') {
    sigungu = document.getElementById('sigungu').value.trim();
    dong    = document.getElementById('dong').value.trim();
    bunji   = document.getElementById('bunji').value.trim();
    if (!sigungu || !dong || !bunji) { showErr('시군구, 법정동, 번지를 모두 입력하세요'); return; }
  } else {
    sigungu = document.getElementById('road-sigungu').value.trim();
    const roadAddr = document.getElementById('road-addr').value.trim();
    if (!sigungu || !roadAddr) { showErr('시군구와 도로명 주소를 입력하세요'); return; }
    dong = roadAddr;
    bunji = '';
  }

  let sigunguCd = null;
  for (const [key, val] of Object.entries(SIGUNGU_MAP)) {
    if (sigungu.includes(key) || key.includes(sigungu)) { sigunguCd = val; break; }
  }
  if (!sigunguCd) { showErr(`"${sigungu}" 시군구를 찾을 수 없습니다`); return; }

  if (type === 'road') {
    showErr('도로명 주소 검색은 준비 중이에요.\n지번 주소로 검색해주세요.');
    return;
  }

  const bjdongCd = DONG_MAP[dong] ? DONG_MAP[dong].padStart(5, '0') : null;
  if (!bjdongCd) { showErr(`"${dong}" 법정동 코드를 찾을 수 없습니다`); return; }

  const parts = bunji.split('-');
  const bun = (parts[0] || '0').padStart(4, '0');
  const ji  = (parts[1] || '0').padStart(4, '0');

  showLoading();

  try {
    const res  = await fetch(`/api/building?sigunguCd=${sigunguCd}&bjdongCd=${bjdongCd}&bun=${bun}&ji=${ji}`);
    const json = await res.json();
    if (json.error) { showErr(json.error); return; }
    renderResult(json.data, sigungu, dong, bunji, json.elevator);
    saveRecent(sigungu, dong, bunji, json.data);
  } catch (e) {
    showErr('서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
  }
}

function calcElevRisk(elevData) {
  if (!elevData || elevData.length === 0) return null;

  let maxRisk = 0;
  let status = '정상';
  let detail = '';

  const today = new Date();

  elevData.forEach(e => {
    let risk = 0;

    // 설치 연식
    if (e.installationDe) {
      const installYear = parseInt(e.installationDe.slice(0, 4));
      const age = today.getFullYear() - installYear;
      if (age > 20) risk += 50;
      else if (age > 15) risk += 35;
      else if (age > 10) risk += 15;
      else if (age > 5)  risk += 5;
    }

    // 검사 유효기간 초과 여부
    if (e.vldtyEndDe) {
      const endDate = new Date(
        e.vldtyEndDe.slice(0,4) + '-' +
        e.vldtyEndDe.slice(4,6) + '-' +
        e.vldtyEndDe.slice(6,8)
      );
      const diffDays = Math.floor((endDate - today) / (1000*60*60*24));
      if (diffDays < 0) { risk += 40; status = '검사 만료'; detail = `${Math.abs(diffDays)}일 초과`; }
      else if (diffDays < 30) { risk += 25; status = '만료 임박'; detail = `${diffDays}일 남음`; }
      else if (diffDays < 90) { risk += 10; }
    }

    // 판정 결과
    if (e.jdgmentNm && e.jdgmentNm.includes('부적합')) { risk += 30; status = '부적합'; }

    // 승강기 상태
    if (e.elvtrSttsNm && e.elvtrSttsNm.includes('운행정지')) { risk += 20; status = '운행정지'; }

    maxRisk = Math.max(maxRisk, Math.min(risk, 99));
  });

  return { risk: maxRisk, status, detail, count: elevData.length };
}

function calcElecRisk(age, struct, underground) {
  let r = 20;
  if (age > 35) r += 50;
  else if (age > 25) r += 35;
  else if (age > 15) r += 15;
  else if (age > 5)  r += 5;
  if (struct.includes('조적')) r += 15;
  if (struct.includes('목'))   r += 20;
  if (underground > 0) r += 10;
  return Math.min(r, 99);
}

function calcRisk(age, struct) {
  let r = 25;
  if (age > 35) r += 45;
  else if (age > 25) r += 30;
  else if (age > 15) r += 15;
  else if (age > 5)  r += 5;
  if (struct.includes('조적')) r += 18;
  if (struct.includes('목'))   r += 12;
  return Math.min(r, 99);
}

function renderResult(d, sigungu, dong, bunji, elevData) {
  const year    = d.useAprDay ? d.useAprDay.slice(0, 4) : '미상';
  const age     = year !== '미상' ? (new Date().getFullYear() - parseInt(year)) : 0;
  const struct  = d.strctCdNm     || '미상';
  const floors  = (d.grndFlrCnt   || 3);
  const floorLabel = floors + '층';
  const purpose = d.mainPurpsCdNm || '미상';
  const addr    = d.platPlc       || `${sigungu} ${dong} ${bunji}`;
  const bldName = d.bldNm         || '';
  currentAddr = addr;

  const risk   = calcRisk(age, struct);
  const leak   = risk;
  const block  = Math.round(risk * 0.82);
  const freeze = Math.round(risk * 0.55);
  const underground = parseInt(d.ugrndFlrCnt) || 0;
  const elec = calcElecRisk(age, struct, underground);

  const [bc, bt, rc, rt] = risk >= 70
    ? ['danger', '⚠ 고위험', '#e05050', '고위험']
    : risk >= 45
    ? ['warn',   '주의',     '#e07b39', '중위험']
    : ['ok',     '양호',     '#50c070', '저위험'];

  const elevResult = calcElevRisk(elevData);
  const { svg: pipeSvg, mat } = buildPipeDiagram(floors, year, struct);
  const matColor = mat.color;

  document.getElementById('result').innerHTML = `
    <div class="bcard">
      <div class="bhead">
        <div>
          <div class="bname">${bldName || addr}</div>
          <div class="baddr">${addr}</div>
          <div class="baddr">${purpose} · 준공 ${year}년 · ${age}년 경과</div>
        </div>
        <div class="badge ${bc}">${bt}</div>
      </div>
      <div class="igrid">
        <div class="iitem"><label>준공연도</label><span>${year}</span></div>
        <div class="iitem"><label>층수</label><span>${floorLabel}</span></div>
        <div class="iitem"><label>구조</label><span>${struct}</span></div>
      </div>

      <div class="pipesec">
        <div class="pipetitle">
          AI 배관 구조 추정
          <span class="pipe-material" style="background:${matColor}22;color:${matColor};border:1px solid ${matColor}44;">${mat.name}</span>
        </div>
        ${pipeSvg}
        <div class="pipe-legend">
          <div class="legend-item"><div class="legend-dot" style="background:${matColor}"></div>주배관</div>
          <div class="legend-item"><div class="legend-dot" style="background:#e05050"></div>위험 구간</div>
          <div class="legend-item"><div class="legend-dot" style="background:#4a9ede"></div>수도 인입</div>
        </div>
        <div style="font-size:12px;color:var(--muted);margin-top:8px;padding:8px;background:#1a1d2a;border-radius:6px;">${mat.desc}</div>
      </div>

      <div class="risksec">
        <div class="risktitle">
          AI 배관 위험 분석
          <span class="risk-tag" style="background:${rc}22;color:${rc};border:1px solid ${rc}44;">${rt}</span>
        </div>
        <div class="rrow"><span class="rlabel">누수 위험</span><div class="rtrack"><div class="rfill" style="width:0%;background:#e05050;" data-w="${leak}"></div></div><span class="rpct">${leak}%</span></div>
        <div class="rrow"><span class="rlabel">배관 막힘</span><div class="rtrack"><div class="rfill" style="width:0%;background:#e07b39;" data-w="${block}"></div></div><span class="rpct">${block}%</span></div>
        <div class="rrow"><span class="rlabel">동파 위험</span><div class="rtrack"><div class="rfill" style="width:0%;background:#4a9ede;" data-w="${freeze}"></div></div><span class="rpct">${freeze}%</span></div>
        <div class="rrow"><span class="rlabel">누전 위험</span><div class="rtrack"><div class="rfill" style="width:0%;background:#f0c040;" data-w="${elec}"></div></div><span class="rpct">${elec}%</span></div>
      </div>
      ${elevResult ? `
      <div class="risksec" style="border-top:1px solid var(--border2);">
        <div class="risktitle">
          승강기 안전 현황
          <span class="risk-tag" style="background:${elevResult.risk>=70?'#e0505022':'#50c07022'};color:${elevResult.risk>=70?'#e05050':'#50c070'};border:1px solid ${elevResult.risk>=70?'#e0505044':'#50c07044'};">${elevResult.status}</span>
        </div>
        <div class="rrow"><span class="rlabel">사고 위험</span><div class="rtrack"><div class="rfill" style="width:0%;background:#c070e0;" data-w="${elevResult.risk}"></div></div><span class="rpct">${elevResult.risk}%</span></div>
        <div style="font-size:12px;color:var(--muted);margin-top:6px;">
          승강기 ${elevResult.count}대 확인됨
          ${elevResult.detail ? ` · ${elevResult.detail}` : ''}
        </div>
      </div>` : ''}
      <div class="detailsec">
        <div class="dtitle">건물 상세정보</div>
        <div class="drow"><span>주용도</span><span>${purpose}</span></div>
        <div class="drow"><span>지하층수</span><span>${d.ugrndFlrCnt || 0}층</span></div>
        <div class="drow"><span>세대수</span><span>${d.hhldCnt || '-'}세대</span></div>
        <div class="drow"><span>연면적</span><span>${d.totArea ? Math.round(d.totArea).toLocaleString() + '㎡' : '-'}</span></div>
        <div class="drow"><span>건폐율</span><span>${d.bcRat ? Math.round(d.bcRat) + '%' : '-'}</span></div>
      </div>
      <div class="history-sec" id="history-sec">
        <div class="history-title">
          <span>수리 이력</span>
          <button class="history-add-btn" onclick="toggleHistoryForm()">+ 이력 추가</button>
        </div>
        <div class="history-form" id="history-form">
          <input class="history-input" id="h-location" placeholder="위치 (예: 3층 화장실 배수관)" />
          <textarea class="history-textarea" id="h-memo" placeholder="작업 내용 (예: 배수관 교체, PVC 50mm)"></textarea>
          <button class="history-save-btn" onclick="saveHistory()">저장</button>
        </div>
        <div id="history-list"></div>
      </div>
    </div>`;

  requestAnimationFrame(() => {
    document.querySelectorAll('.rfill').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
  });
  setTimeout(renderHistory, 100);
}

function showLoading() {
  document.getElementById('result').innerHTML =
    `<div class="loading"><span class="spinner"></span>건물 정보 조회 중...</div>`;
}
function showErr(msg) {
  document.getElementById('result').innerHTML =
    `<div class="errmsg">${msg.replace(/\n/g, '<br>')}</div>`;
}

document.getElementById('bunji').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch('jibun');
});
document.getElementById('road-addr').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch('road');
});

renderRecent();
</script>
